name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy

      - name: Tests (pytest)
        run: pytest

  # The committed requirements.lock was frozen on Windows (contains pywin32
  # etc.), so it cannot drive Linux/Docker installs. This job produces the
  # Linux equivalent as a downloadable artifact on every run.
  linux-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Resolve runtime dependencies on Linux
        run: pip install -r requirements.txt

      - name: Export Linux lockfile
        run: pip freeze > requirements-linux.lock

      - uses: actions/upload-artifact@v4
        with:
          name: requirements-linux.lock
          path: requirements-linux.lock
